<!-- templates/base.html -->
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Запись к врачу" }}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet">
</head>
<body class="bg-white">

<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">
      Запись к врачу
    </a>

    <div class="navbar-nav me-auto">
      <a class="nav-link" href="{{ url_for('index') }}">Новая запись</a>
      <a class="nav-link" href="{{ url_for('search', mode='one') }}">Поиск</a>
      <a class="nav-link" href="{{ url_for('admin') }}">Администрирование</a>
    </div>

    <div class="d-flex gap-2 align-items-center">
      <span class="small text-muted">База:</span>

        <a class="btn btn-sm {{ 'btn-accent' if active_db_key=='A' else 'btn-outline-accent' }}"
        href="{{ url_for('switch_db', db_key='A', next=request.full_path) }}">
        Access
        </a>
        <a class="btn btn-sm {{ 'btn-accent' if active_db_key=='B' else 'btn-outline-accent' }}"
        href="{{ url_for('switch_db', db_key='B', next=request.full_path) }}">
        Postgres
        </a>
    </div>
  </div>
</nav>

<div class="container my-4">
  {% block content %}{% endblock %}
</div>

<!-- Toast container -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="toast align-items-center text-bg-{{ 'danger' if category=='danger' else category }}"
           role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000">
        <div class="d-flex">
          <div class="toast-body">{{ message }}</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto"
                  data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    {% endfor %}
  {% endwith %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
